<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFC Food Order | Login & Signup</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <!-- Auth Card -->
        <div class="auth-card fade-in">
            <div class="auth-logo">
                <span class="logo-emoji">🍽</span>
                <h1>SFC Food</h1>
                <p>Welcome back! Best food in town.</p>
            </div>

            <div class="auth-tabs">
                <button id="tab-login" class="active">Login</button>
                <button id="tab-signup">Signup</button>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>Email or Username</label>
                    <input type="text" id="login-email" placeholder="Enter email, name, or phone" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required>
                    <button type="button" id="forgot-password" class="text-link mt-5">Forgot Password?</button>
                </div>
                <button type="submit" class="btn-primary w-full">Login</button>
            </form>

            <form id="signup-form" class="hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="signup-mobile" placeholder="10-digit number" pattern="[0-9]{10}" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Min. 6 chars" required minlength="6">
                </div>
                <div class="input-group hidden">
                    <select id="signup-role">
                        <option value="customer" selected>Customer</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary w-full">Create Account</button>
            </form>

            <div id="auth-error" class="error-text"></div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="dev-label">APP DEVELOPED BY VIGNESH</div>
        <a href="tel:9360039283" class="dev-contact">📞 CONTACT: 9360039283</a>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
