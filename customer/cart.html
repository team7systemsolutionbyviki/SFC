<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFC Food | Your Cart</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/customer.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">🍽 SFC Food</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="orders.html" class="nav-link">Order History</a>
            </div>
        </div>
    </header>

    <main class="container cart-container">
        <h2>Your Shopping Cart</h2>
        
        <div class="cart-layout">
            <!-- Cart Items -->
            <div id="cart-list" class="cart-list">
                <!-- Injected by JS -->
                <div class="empty-cart hidden" id="empty-cart-msg">
                    <p>Your cart is empty. Go add some delicious food!</p>
                    <a href="index.html" class="btn-primary">Browse Food</a>
                </div>
            </div>

            <!-- Checkout Form -->
            <div id="checkout-area" class="checkout-card">
                <h3>Order Selection</h3>
                <form id="checkout-form">
                    <div class="order-type-tabs">
                        <label class="type-tab">
                            <input type="radio" name="order-type" value="Pickup" checked>
                            <div class="tab-box">🛍 Pickup</div>
                        </label>
                        <label class="type-tab">
                            <input type="radio" name="order-type" value="Delivery">
                            <div class="tab-box">🚚 Delivery</div>
                        </label>
                    </div>

                    <div class="input-group">
                        <label>Customer Name</label>
                        <input type="text" id="cust-name" required>
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="cust-phone" required pattern="[0-9]{10}">
                    </div>
                    
                    <!-- Delivery/Dining Only Fields -->
                    <div id="delivery-info" class="hidden">
                        <div class="input-group">
                            <label>Select Delivery Area</label>
                            <select id="delivery-area" class="filter-select">
                                <option value="0" data-fee="0">Select Area (Fee Apply)</option>
                                <!-- Injected by JS -->
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Full Address / Details</label>
                            <textarea id="cust-address" rows="2" placeholder="Enter details..."></textarea>
                        </div>
                        <div class="location-picker">
                            <button type="button" id="get-location-btn" class="btn-location">📍 Share Map Location (Optional)</button>
                            <div id="location-status" class="status-msg"></div>
                            <input type="hidden" id="map-link">
                        </div>
                    </div>
                    
                    <!-- Coupon Section -->
                    <div class="coupon-box" style="margin-top: 1.5rem; background: #fdfdfd; padding: 15px; border: 1px dashed #ccc; border-radius: 10px; margin-bottom: 2rem;">
                        <label style="font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 8px;">🎁 Have a Coupon?</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="coupon-input" placeholder="Enter code..." style="flex: 1; text-transform: uppercase;">
                            <button type="button" id="apply-coupon-btn" class="btn-secondary" style="padding: 8px 15px;">Apply</button>
                        </div>
                        <div id="coupon-msg" style="font-size: 0.8rem; margin-top: 5px;"></div>
                    </div>
                    
                    <div class="order-summary">
                        <div class="summary-row">
                            <span id="order-type-label">Pickup Only</span>
                            <span>Standard</span>
                        </div>
                        <div class="summary-row total">
                            <span>Amount to Pay</span>
                            <span id="grand-total">₹0</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full" id="place-order-btn">Place Order</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="dev-label">APP DEVELOPED BY VIGNESH</div>
        <a href="tel:9360039283" class="dev-contact">📞 CONTACT: 9360039283</a>
    </footer>

    <!-- Scripts -->
    <script type="module" src="../js/cart.js"></script>
</body>
</html>
