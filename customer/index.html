<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFC Food | Order Now</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/customer.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">🍽 SFC Food</div>
            <div class="search-wrap">
                <input type="text" id="food-search" placeholder="Search for food...">
            </div>
            <div class="nav-links">
                <a href="orders.html" class="nav-link">Order History</a>
                <a href="cart.html" class="nav-btn-cart">
                    🛒 Cart (<span id="cart-count">0</span>)
                </a>
                <button id="logout-btn" class="nav-link">Logout</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-content">
            <h2>Order Your Favorite Food!</h2>
            <p>Delicious food from local restaurants delivered in minutes.</p>
        </div>
    </section>

    <!-- Filters -->
    <div class="container">
        <div class="category-filters" id="cat-filters">
            <button class="cat-pill active" data-category="All">All</button>
            <button class="cat-pill" data-category="Veg">Veg</button>
            <button class="cat-pill" data-category="Non-Veg">Non-Veg</button>
            <button class="cat-pill" data-category="Drinks">Drinks</button>
            <button class="cat-pill" data-category="Snacks">Snacks</button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container">
        <div id="food-grid" class="food-grid">
            <!-- Product cards will be injected by JavaScript -->
        </div>
    </main>

    <footer class="app-footer">
        <div class="dev-label">APP DEVELOPED BY VIGNESH</div>
        <a href="tel:9360039283" class="dev-contact">📞 CONTACT: 9360039283</a>
    </footer>

    <!-- Scripts -->
    <script type="module" src="../js/customer.js"></script>
